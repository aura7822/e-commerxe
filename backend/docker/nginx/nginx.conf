worker_processes auto;
error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ── Logging ────────────────────────────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" '
                    'rt=$request_time';
    access_log /var/log/nginx/access.log main;

    # ── Performance ────────────────────────────────────────────────────────
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;
    gzip on;
    gzip_types text/plain application/json application/javascript text/css;
    gzip_min_length 1024;

    # ── Security — hide Nginx version ─────────────────────────────────────
    server_tokens off;

    # ── Rate limiting zones (SRS §3.1) ────────────────────────────────────
    # login: 5 req/min per IP
    limit_req_zone $binary_remote_addr zone=auth_login:10m    rate=5r/m;
    # register: 3 req/min per IP
    limit_req_zone $binary_remote_addr zone=auth_register:10m rate=3r/m;
    # password-reset: 3 req/hour per IP
    limit_req_zone $binary_remote_addr zone=auth_reset:10m    rate=3r/h;
    # media upload: 10 req/min per IP
    limit_req_zone $binary_remote_addr zone=media_upload:10m  rate=10r/m;
    # general API: 100 req/min per IP
    limit_req_zone $binary_remote_addr zone=api_general:10m   rate=100r/m;

    limit_req_status 429;
    limit_conn_zone $binary_remote_addr zone=conn_limit:10m;
    limit_conn conn_limit 20;

    # ── Upstream (NestJS) ──────────────────────────────────────────────────
    upstream nestjs_api {
        server api:3000;
        keepalive 32;
    }

    server {
        listen 80;
        server_name _;

        # ── Security headers ───────────────────────────────────────────────
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        add_header X-Content-Type-Options    "nosniff"                                      always;
        add_header X-Frame-Options           "DENY"                                         always;
        add_header Referrer-Policy           "strict-origin-when-cross-origin"              always;
        add_header Permissions-Policy        "geolocation=(), microphone=(), camera=()"     always;

        # ── /metrics — internal only ───────────────────────────────────────
        location /metrics {
            allow 10.0.0.0/8;
            allow 172.16.0.0/12;
            allow 127.0.0.1;
            deny  all;
            proxy_pass http://nestjs_api;
        }

        # ── Auth: login ───────────────────────────────────────────────────
        location = /api/v1/auth/login {
            limit_req zone=auth_login burst=3 nodelay;
            proxy_pass http://nestjs_api;
            include /etc/nginx/conf.d/proxy_params.conf;
        }

        # ── Auth: register ────────────────────────────────────────────────
        location = /api/v1/auth/register {
            limit_req zone=auth_register burst=2 nodelay;
            proxy_pass http://nestjs_api;
            include /etc/nginx/conf.d/proxy_params.conf;
        }

        # ── Auth: password-reset ──────────────────────────────────────────
        location ~ ^/api/v1/auth/password-reset {
            limit_req zone=auth_reset burst=1 nodelay;
            proxy_pass http://nestjs_api;
            include /etc/nginx/conf.d/proxy_params.conf;
        }

        # ── Media upload ──────────────────────────────────────────────────
        location = /api/v1/media/upload {
            limit_req zone=media_upload burst=5 nodelay;
            client_max_body_size 11m;  # slightly above 10MB app limit
            proxy_pass http://nestjs_api;
            include /etc/nginx/conf.d/proxy_params.conf;
        }

        # ── General API ───────────────────────────────────────────────────
        location /api/ {
            limit_req zone=api_general burst=20 nodelay;
            proxy_pass http://nestjs_api;
            include /etc/nginx/conf.d/proxy_params.conf;
        }

        # ── Health (no rate limit) ────────────────────────────────────────
        location = /health {
            proxy_pass http://nestjs_api;
            access_log off;
        }

        # ── Swagger docs (dev only — disable in prod via env) ─────────────
        location /api/docs {
            proxy_pass http://nestjs_api;
            include /etc/nginx/conf.d/proxy_params.conf;
        }
    }
}
