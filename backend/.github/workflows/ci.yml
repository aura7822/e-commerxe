name: CI — Lint · Test · Build · Security

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  NODE_VERSION: '20'

jobs:
  # ── 1. Lint ────────────────────────────────────────────────────────────────
  lint:
    name: ESLint + Prettier
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

      - name: Check Prettier formatting
        run: npx prettier --check "src/**/*.ts"

  # ── 2. Unit Tests ──────────────────────────────────────────────────────────
  unit-tests:
    name: Unit Tests (≥80% coverage)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests with coverage
        run: npm run test:cov
        env:
          NODE_ENV: test

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

  # ── 3. Integration / RLS Tests ─────────────────────────────────────────────
  integration-tests:
    name: RLS Integration Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: ecommerxe_test
          POSTGRES_USER: ecommerxe_user
          POSTGRES_PASSWORD: test_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run migrations on test DB
        run: ./scripts/migrate.sh run
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_NAME: ecommerxe_test
          DB_USER: ecommerxe_user
          DB_PASSWORD: test_password
          DB_SSL: 'false'

      - name: Run RLS integration tests
        run: npx jest --testPathPattern=rls.integration
        env:
          TEST_DB_HOST: localhost
          TEST_DB_PORT: 5432
          TEST_DB_NAME: ecommerxe_test
          TEST_DB_USER: ecommerxe_user
          TEST_DB_PASSWORD: test_password

  # ── 4. Security Scan (Snyk) ────────────────────────────────────────────────
  security:
    name: Snyk Dependency Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: snyk/actions/node@master
        continue-on-error: true        # don't block on non-critical issues
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=high

  # ── 5. Docker Build ────────────────────────────────────────────────────────
  docker-build:
    name: Docker Build (production stage)
    runs-on: ubuntu-latest
    needs: [lint, unit-tests]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build production Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          target: production
          push: false
          tags: ecommerxe-api:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── 6. Canary Deploy (main branch only) ────────────────────────────────────
  deploy-canary:
    name: Deploy Canary (5%)
    runs-on: ubuntu-latest
    needs: [docker-build, integration-tests, security]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Login to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push to registry
        uses: docker/build-push-action@v5
        with:
          context: .
          target: production
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:${{ github.sha }}
            ghcr.io/${{ github.repository }}:canary
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy canary (5% traffic)
        run: |
          echo "Deploying canary to 5% of traffic..."
          echo "SHA: ${{ github.sha }}"
          # Replace with actual deploy command:
          # kubectl set image deployment/ecommerxe-api api=ghcr.io/${{ github.repository }}:${{ github.sha }}
          # kubectl annotate deployment/ecommerxe-api kubernetes.io/change-cause="canary ${{ github.sha }}"
